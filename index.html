<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Memo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container glass">
        <header>
            <div class="header-content">
                <h1>Beautiful Memo</h1>
                <p>간단하고 아름다운 메모장</p>
            </div>
            <div id="loading-spinner" class="spinner hidden"></div>
        </header>

        <main>
            <form id="memo-form" class="input-section glass-form">
                <textarea id="memo-text" placeholder="메모를 입력하세요..." required rows="4"></textarea>
                <div class="form-actions">
                    <button type="submit" id="save-btn" class="glass-btn primary">메모 저장</button>
                </div>
            </form>

            <div class="memos-header">
                <h2>내 메모</h2>
            </div>

            <div class="memos-container" id="memos-list">
                <!-- Memos will be injected here -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
